name: zuc-bench

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zuc-bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: ZUC benchmark (arm64)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Get CPU info
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          {
            echo "=== CPU Information ==="
            uname -a
            echo ""
            echo "=== Processor Details ==="
            lscpu || true
            echo ""
            echo "=== /proc/cpuinfo ==="
            cat /proc/cpuinfo || true
          } | tee artifacts/cpu-info.txt

      - name: Run ZUC benchmarks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          go test -run '^$' -bench . -benchmem -benchtime=300ms ./zuc | tee artifacts/zuc-bench.txt

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zuc-bench-${{ github.run_id }}
          path: artifacts/
