name: cipher-bench

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cipher-bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Cipher benchmark (arm64)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"

      - name: Get CPU info
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          {
            echo "=== CPU Information ==="
            uname -a
            echo ""
            echo "=== Processor Details ==="
            lscpu || true
            echo ""
            echo "=== /proc/cpuinfo ==="
            cat /proc/cpuinfo || true
          } | tee artifacts/cpu-info.txt

      - name: Run cipher with SM4NI benchmarks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          go test -run '^$' -bench . -benchmem -benchtime=300ms ./cipher | tee artifacts/cipher-sm4ni-bench.txt

      - name: Run cipher without SM4NI benchmarks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          go test -run '^$' -bench . -benchmem -benchtime=300ms ./cipher | tee artifacts/cipher-bench.txt
        env:
          DISABLE_SM4NI: 1

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cipher-bench-${{ github.run_id }}
          path: artifacts/
