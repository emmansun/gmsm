name: ci

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goVer: ['1.25', '1.26']
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout Repo
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
  
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ matrix.goVer }}
       
    - name: Test with Coverage
      if: ${{ matrix.goVer == '1.25' }}
      run: go test -coverpkg=./... -v -short -race -coverprofile=coverage1.txt -covermode=atomic ./...
      env:
        GODEBUG: x509sha1=1

    - name: Test Generic with Coverage
      if: ${{ matrix.goVer == '1.25' }}
      run: go test -coverpkg=./... -v -short -tags purego  -coverprofile=coverage2.txt -covermode=atomic ./...      
      env:
        GODEBUG: x509sha1=1

    - name: Upload coverage to Codecov
      if: ${{ matrix.goVer == '1.25' }}
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        files: ./coverage1.txt,./coverage2.txt
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  
    - name: Test Force SM4 Single Block with AES-NI
      run: go test -short ./sm4/...      
      env:
        FORCE_SM4BLOCK_AESNI: 1

    - name: Test only
      if: ${{ matrix.goVer != '1.25' }}
      run: go test -short ./...
      env:
        GODEBUG: x509sha1=1

    - name: Test Generic only
      if: ${{ matrix.goVer != '1.25' }}
      run: go test -short -tags purego ./...      
      env:
        GODEBUG: x509sha1=1

    - name: Test Plugin only
      if: ${{ matrix.goVer == '1.25' }}
      run: go test -short -tags plugin ./...      
      env:
        GODEBUG: x509sha1=1

  smx509-patch-consistency:
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout Repo
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.25'

    - name: Generate baseline from Go stdlib
      run: |
        GOROOT=$(go env GOROOT)
        mkdir -p .tmp/patch-baseline
        for f in $GOROOT/src/crypto/x509/*.go; do
          base=$(basename "$f")
          # Skip test files
          case "$base" in *_test.go) continue;; esac
          cp "$f" .tmp/patch-baseline/
        done
        # Apply import rewrites (same as smx509-sync.ps1)
        for f in .tmp/patch-baseline/*.go; do
          sed -i 's|"internal/godebug"|"github.com/emmansun/gmsm/internal/godebug"|g' "$f"
          sed -i 's|"internal/goos"|"github.com/emmansun/gmsm/internal/goos"|g' "$f"
        done
        # Rename package x509 → smx509
        for f in .tmp/patch-baseline/*.go; do
          sed -i 's/^package x509$/package smx509/' "$f"
        done

    - name: Regenerate patches and check consistency
      run: |
        go run scripts/gen_patches.go
        if ! git diff --exit-code scripts/smx509-patches/; then
          echo "::error::smx509 patches are out of sync! Run 'go run scripts/gen_patches.go' locally and commit the result."
          exit 1
        fi
