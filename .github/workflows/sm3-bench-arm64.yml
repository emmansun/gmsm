name: sm3-bench

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sm3-bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: SM3 benchmark (arm64)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Get CPU info
        shell: bash
        run: |
          set -eu

          OUT="$GITHUB_WORKSPACE/artifacts"
          mkdir -p "$OUT"

          CPU_FILE="$OUT/cpu-info.txt"

          echo "=== System Information ==="        >  "$CPU_FILE"
          uname -a                               >> "$CPU_FILE"
          echo                                   >> "$CPU_FILE"

          echo "=== Processor Details ==="        >> "$CPU_FILE"
          if command -v lscpu >/dev/null 2>&1; then
            lscpu                                 >> "$CPU_FILE"
          else
            echo "lscpu not available"           >> "$CPU_FILE"
          fi
          echo                                   >> "$CPU_FILE"

          echo "=== /proc/cpuinfo ==="            >> "$CPU_FILE"
          cat /proc/cpuinfo                       >> "$CPU_FILE"

          echo "Generated files:"
          ls -l "$OUT"

      - name: Run sm3 benchmarks
        shell: bash
        run: |
          set -eu

          OUT="$GITHUB_WORKSPACE/artifacts"
          mkdir -p "$OUT"

          BENCH_FILE="$OUT/sm3-bench.txt"

          go test -run '^$' \
                  -bench . \
                  -benchmem \
                  -benchtime=300ms \
                  ./sm3 \
            > "$BENCH_FILE"

          echo "Generated files:"
          pwd
          ls -la "$OUT"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sm3-bench-${{ github.run_id }}
          path: artifacts/
