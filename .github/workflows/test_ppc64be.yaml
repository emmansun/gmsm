# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: ppc64-qemu

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

permissions:
  contents: read

jobs:

  test:
    strategy:
      matrix:
        go-version: [1.25.x]
        arch: [ppc64]
        ppc64: [power8]
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: ${{ matrix.go-version }}

    - name: Set up QEMU (ppc64 big-endian)
      # docker/setup-qemu-action only supports ppc64le; install qemu-user-static
      # from apt which includes qemu-ppc64-static and registers binfmt_misc for
      # big-endian PowerPC 64-bit ELF binaries.
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y qemu-user-static

    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Test internal
      run: go test -v ./internal/...
      env:
        GOARCH: ${{ matrix.arch }}
        GOPPC64: ${{ matrix.ppc64 }}

    - name: Test Cipher
      run: go test -v -short ./cipher/...
      env:
        GOARCH: ${{ matrix.arch }}
        GOPPC64: ${{ matrix.ppc64 }}
